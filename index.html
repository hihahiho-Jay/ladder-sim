<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브레인케어 생활자금 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#16203a; --ink2:#5a6580; --line:#e4e8f0; --paper:#fff;
    --bg:#eceff5; --blue:#2f54d6; --teal:#0fb5a0; --amber:#f0a020; --rose:#e8526e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;padding:18px}
  .wrap{max-width:940px;margin:0 auto}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;
    padding:24px 26px;margin-bottom:16px;box-shadow:0 2px 14px rgba(22,32,58,.05)}
  .eyebrow{font-size:11px;font-weight:800;color:var(--blue);letter-spacing:1.5px;margin-bottom:7px}
  h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
  h1 .s{display:block;font-size:13px;font-weight:500;color:var(--ink2);margin-top:6px}
  .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:13px;margin-top:4px}
  label.l{display:block;font-size:11px;font-weight:800;color:var(--ink2);margin-bottom:6px;letter-spacing:.3px}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{flex:1;border:none;background:var(--paper);padding:9px 4px;font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer}
  .seg button.on{background:var(--blue);color:#fff}
  select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-weight:700;color:var(--ink);background:var(--paper)}
  /* 등급 선택 = 한 줄 6칸. 비활성 = 회색 / 활성 = 빨강 + 가입금액 표시 */
  .checks{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-top:6px}
  .grade-wrap{background:#fff;border:2px solid var(--line);border-radius:6px;
    padding:4px 1px;text-align:center;user-select:none;transition:.12s;line-height:1.1}
  .grade-wrap.on{border-color:#dc2626;background:#fff5f5}
  .grade-wrap .grade-label{font-size:11px;font-weight:800;color:var(--ink2);margin-bottom:2px}
  .grade-wrap.on .grade-label{color:#dc2626}
  .grade-sel{width:100%;font-size:12px;font-weight:700;padding:3px 1px;
    border:1px solid var(--line);border-radius:4px;background:#fff;color:#9ca3af;cursor:pointer;
    -webkit-appearance:none;-moz-appearance:none;appearance:none;text-align:center;text-align-last:center}
  .grade-wrap.on .grade-sel{border-color:#dc2626;color:#dc2626;background:#fff;font-size:13px}
  /* 차트 영역 = 가로 스크롤만. 세로 = JS로 화면 비율에 맞춰 동적 */
  .chartbox{position:relative;margin-top:4px;overflow-x:auto;overflow-y:visible;
    -webkit-overflow-scrolling:touch;touch-action:pan-x;background:#fafbfd;border-radius:10px;
    padding-top:20px}
  .chart-inner{position:relative}
  canvas#chart{display:block}
  /* 등급 시작 나이 표시 = 점선 + 라벨 */
  .age-line{position:absolute;width:1.5px;background:repeating-linear-gradient(to bottom,#dc2626 0,#dc2626 3px,transparent 3px,transparent 6px);pointer-events:none;z-index:5}
  .age-line-down{position:absolute;width:1.5px;background:repeating-linear-gradient(to bottom,#9ca3af 0,#9ca3af 3px,transparent 3px,transparent 6px);pointer-events:none;z-index:1}
  .age-label{position:absolute;background:#dc2626;color:#fff;font-size:11px;font-weight:800;padding:2px 7px;border-radius:5px;white-space:nowrap;transform:translateX(-50%);pointer-events:none;z-index:6;line-height:1.2}
  .bar-overlay.dragging .age-line,.bar-overlay.dragging .age-line-down,.bar-overlay.dragging .age-label{display:none}
  .bar-overlay{position:absolute;left:0;top:0;bottom:0;pointer-events:none}
  .bar-row{position:absolute;left:0;right:0;height:20px;pointer-events:none;overflow:visible}
  .bar{position:absolute;top:2px;bottom:2px;border-radius:5px;cursor:grab;
    display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.15);user-select:none;-webkit-user-select:none;
    text-align:center;padding:0 5px;overflow:hidden;white-space:nowrap;
    touch-action:none;-webkit-touch-callout:none;pointer-events:auto;min-width:40px}
  .bar:active{cursor:grabbing;opacity:.85}
  .bar.dragging-self{outline:3px solid #fff;box-shadow:0 0 0 4px #16203a,0 4px 12px rgba(0,0,0,.3);z-index:10}
  .bar.g0{background:hsl(0,95%,50%)}
  .bar.g1{background:hsl(0,80%,55%)}
  .bar.g2{background:hsl(0,60%,58%)}
  .bar.g3{background:hsl(0,45%,60%)}
  .bar.g4{background:hsl(0,32%,62%)}
  .bar.g5{background:hsl(0,20%,65%);color:#fff}
  .bar .x2{position:absolute;top:-8px;right:-3px;background:#fff;color:#dc2626;border:1.5px solid #dc2626;padding:0 5px;border-radius:5px;font-size:9px;font-weight:900;line-height:1.3}
  .topgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
  .stat{background:#f7f9fc;border:1px solid var(--line);border-radius:13px;padding:14px 16px}
  .stat .k{font-size:11px;font-weight:800;color:var(--ink2);margin-bottom:7px;letter-spacing:.3px}
  .stat{padding:10px 12px}
  .stat .k{font-size:10px;margin-bottom:4px}
  .stat .v{font-size:22px;font-weight:900;letter-spacing:-1px;line-height:1.05}
  .stat .v small{font-size:11px;font-weight:700;color:var(--ink2);margin-left:2px}
  .stat.pay .v{color:var(--ink)}
  .stat.peak .v{color:var(--blue)}
  .stat.total{background:#fff1f1;border-color:#f5c2c2}
  .stat.total .v{color:#dc2626;font-size:26px}
  .stat.total .k{color:#dc2626}
  .topgrid{gap:8px}
  .punch{background:#fff;border:3px solid #dc2626;color:#dc2626;border-radius:12px;padding:12px 16px;margin-bottom:14px;font-weight:600;font-size:15px;line-height:1.45;position:relative}
  .punch .note{position:absolute;top:8px;right:14px;font-size:10px;font-weight:500;color:#b06060;letter-spacing:-.3px}
  .punch b{font-size:18px;font-weight:800;color:#dc2626}
  .punch .row{padding:3px 0}
  .punch .div-line{border-top:1px dashed #f5b5b5;margin:6px 0;padding-top:6px}
  .punch .row.paid{font-size:12px;font-weight:400;color:#b06060;letter-spacing:-.3px}
  .punch .row.paid b{font-size:13px;font-weight:500}
  .punch small{font-size:11px;font-weight:500;color:#b06060;margin-left:3px}
  .legend{display:flex;gap:24px;margin-top:14px;font-size:14px;font-weight:800;color:var(--ink)}
  .legend i{display:inline-block;width:16px;height:16px;border-radius:3px;margin-right:7px;vertical-align:-3px}
  .meta{display:flex;gap:16px;flex-wrap:wrap;font-size:15px;font-weight:700;margin:8px 0 14px;
    background:#f4f6fb;padding:8px 10px 8px 16px;border-radius:10px;
    align-items:center;justify-content:space-between}
  .meta-text{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .meta b{color:var(--ink);font-weight:900;font-size:16px}
  .meta span{color:var(--ink2)}
  .btn-mini{background:var(--ink);color:#fff;border:none;padding:7px 14px;border-radius:7px;
    font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .btn-mini:hover{opacity:.88}
  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;border:none;padding:13px 22px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer}
  .toolbar{display:flex;justify-content:flex-end}
  .warn{background:#fff8ec;border:1px solid #f6e2bb;color:#956510;font-size:12px;font-weight:600;padding:11px 14px;border-radius:10px;margin-top:14px;display:flex;gap:7px}

  /* 세로 모드 전용 = 가로 회전 안내 제거됨 */
</style>
</head>
<body>

<div class="wrap">

  <div class="card" id="header">
    <div class="eyebrow">치매 · 장기요양 생활자금</div>
    <h1>브레인케어 생활자금 시뮬레이터
      <span class="s">매달 내는 보험료 한 잔 값으로 — 상태가 나빠질수록 매년 늘어나는 생활자금</span></h1>
  </div>

  <div class="card">
    <div class="eyebrow">가입 조건</div>
    <div class="controls">
      <div><label class="l">가입 나이</label><select id="age"></select></div>
      <div><label class="l">사망(끝) 나이</label><select id="endAge"></select></div>
      <div><label class="l">납입기간</label><div class="seg" id="payTerm"><button data-v="10">10년</button><button data-v="20" class="on">20년</button><button data-v="30">30년</button></div></div>
      <div><label class="l">성별</label><div class="seg" id="gender"><button data-v="남" class="on">남</button><button data-v="여">여</button></div></div>
      <div><label class="l">종류</label><div class="seg" id="sigang"><button data-v="장기요양" class="on">장기요양</button><button data-v="뇌혈관">뇌혈관</button></div></div>
      <div><label class="l">플랜</label><div class="seg" id="plan"><button data-v="뉴노멀I" class="on">뉴노멀 I</button><button data-v="뉴노멀II">뉴노멀 II</button></div></div>
      <div><label class="l">상품유형</label><div class="seg" id="classic"><button data-v="일반" class="on">일반</button><button data-v="클래식">클래식</button></div></div>
      <div><label class="l">만기</label><div class="seg" id="maturity"><button data-v="종신" class="on">종신</button><button data-v="90세">90세</button></div></div>
    </div>
  </div>

  <div class="card">
    <div class="eyebrow">진행 시나리오 — 체크박스로 등급 활성화. 그래프 안 막대를 좌우 드래그해서 발생 시점 조정</div>
    <div class="checks" id="checks"></div>
  </div>

  <div class="card" id="chartcard">
    <div class="chartbox" id="chartbox">
      <div class="chart-inner" id="chart-inner">
        <canvas id="chart"></canvas>
        <div class="bar-overlay" id="bar-overlay"></div>
      </div>
    </div>
  </div>

  <div class="card" id="resultcard">
    <div class="punch" id="punch"></div>
    <div class="topgrid">
      <div class="stat pay"><div class="k">매달 내는 보험료</div><div class="v" id="premV">0<small>원</small></div></div>
      <div class="stat peak"><div class="k">최대 월 수령액</div><div class="v" id="peakV">0<small>만원</small></div></div>
      <div class="stat total"><div class="k">평생 누적 수령</div><div class="v" id="totV">0<small>만원</small></div></div>
    </div>
    <div class="meta">
      <div class="meta-text" id="meta"></div>
      <button class="btn-mini" id="saveBtn">🖼️ 이미지 저장</button>
    </div>
    <div class="warn">⚠️ <div>교육·상담 참고용입니다. 보험료의 중간 나이는 회사 공식 요율표를 곡선 보간하여 산출하며(표상 나이는 정확히 일치), 실제 금액·보장은 약관 및 설계 시 확인하시기 바랍니다. 90일 면책기간이 적용됩니다.</div></div>
  </div>

</div>

  clampAmounts();   // 한도 변경 = 가입금액 자동 clamp
  clampStarts();
  render();
};

function clampStarts(){

    state.start[i] = Math.max(constraintMin(i), Math.min(constraintMax(i), state.start[i]));

// 보험료 PREM은 45~65만 있음 → 66~75 = 65세 값 × 1.07^(나이-65) 외삽
function premAt(key, age){
  const tbl = PREM[key]; if(!tbl) return null;
  if(tbl[age]!=null) return tbl[age];
  if(age>65 && tbl[65]!=null) return Math.round(tbl[65] * Math.pow(1.07, age-65));

// 한도 = 가입 시점 나이 기준 (= 50세 가입 → 평생 64이하, 65세+ 가입 → 평생 65이상)
function limitOf(g){
  const band = state.age>=65 ? '65이상' : '64이하';
  return LIMITS[state.plan][g][band];
}
// 활성 등급의 가입금액 = 한도 내로 clamp + 디폴트도 한도 초과 시 = 한도
function clampAmounts(){
  GRADES.forEach((g,i)=>{
    const max=limitOf(g);
    if(state.amount[i]>max) state.amount[i]=max;
    if(state.amount[i]<50) state.amount[i]=50;
  });
}
// 가입금액 옵션 list = 50만 단위, 한도까지
function amountOptions(i){
  const max=limitOf(GRADES[i]);
  const opts=[];
  for(let m=50;m<=max;m+=50) opts.push(m);
  return opts;
}
// 보험료 = 활성 등급만 합산. 끌투 데이터 = 50만 가입 기준 = amount × prm / 50
// 주계약 가입금액 = 라이나 룰 (UW 무심사 = 자동 강제)
//   뉴노멀I = 300만 / 뉴노멀II = 100만
const MC_AMOUNT={'뉴노멀I':300,'뉴노멀II':100};

// 가입나이 → 적용 가능 납입기간 (라이나 상품 룰)
//   30~69세: 20/30년 (10은 fallback 20)
//   70세:    10/20년 (30은 fallback 20)
//   71~75세: 종신 자동
function resolvePayTerm(age, pt){
  if (age >= 71) return '종신';
  if (age >= 70) return pt === '30' ? '20' : pt;
  return pt === '10' ? '20' : pt;
}

function premium(){
  // 라이나 마이플랜 = 38특약 전체 = entAmt 기준 자동 합산 (= 새담블 계산기와 1:1 일치)
  const pt = resolvePayTerm(state.age, String(state.payTerm));
  const fullKey = `${state.plan}|${state.classic}|${state.gender}|${state.maturity}|${pt}`;
  const riders = PREM_FULL[fullKey];
  if(!riders) return 0;
  let sum = 0;
  const age = String(state.age);
  for(const ins in riders){
    const v = riders[ins][age];
    if(v) sum += v[1];
  }
  return Math.round(sum);
}

// === 테트리스 패턴 = 가로 시간 축 + 등급별 바 드래그 ===
function barLen(i){
  // 인지/5/4 = 10년 고정, 3/2/1 = 시작점~termYears() 끝까지 (만기). 사망 시 = 잘림
  const g=GRADES[i];
  const avail = Math.max(1, termYears()-state.start[i]+1);
  return DURATION[g]===999 ? avail : Math.min(DURATION[g], avail);
}
function constraintMin(i){
  // 좌측 한도 = 직전 활성 등급(인덱스 < i) 중 가장 인덱스 큰 거의 start+1. 없으면 1.
  for(let k=i-1;k>=0;k--){
    if(state.active[k]) return state.start[k]+1;
  }
  return 1;
}
function constraintMax(i){
  // 우측 한도 = termYears() - 바길이 + 1 (= 인지/5/4). 3/2/1은 = 시작점이 어디든 termYears() 끝까지 그어지므로 = termYears().
  const g=GRADES[i];
  if(DURATION[g]===999) return termYears();
  return termYears() - DURATION[g] + 1;
}
function setStart(i,val,fast){
  state.start[i]=Math.max(constraintMin(i), Math.min(constraintMax(i), val));
  for(let k=i+1;k<GRADES.length;k++){
    if(!state.active[k]) continue;
    const minK = constraintMin(k);
    if(state.start[k] < minK){
      state.start[k] = Math.min(constraintMax(k), minK);
    }
  }
  if(fast) quickUpdate();   // 드래그 중 = 막대만 이동 (= DOM 재생성 X)
  else render();
}

function quickUpdate(){
  // 드래그 중 = overlay 막대 위치만 직접 변경 (= DOM 보존 = pointer capture 유지)
  if(!chartGeom) return;
  const overlay=document.getElementById('bar-overlay');
  if(!overlay) return;
  const {cw, N, fs} = chartGeom;
  GRADES.forEach((g,i)=>{
    if(!state.active[i]) return;
    const row = overlay.children[5-i];  // row 0 = 1등급 위
    if(!row) return;
    const bar = row.querySelector('.bar');
    if(!bar) return;
    const start=state.start[i], len=barLen(i);
    const x1 = (start-fs)/Math.max(1,N-1)*cw;
    const x2 = (start+len-1-fs)/Math.max(1,N-1)*cw;
    bar.style.left = Math.max(0,x1)+'px';
    bar.style.width = Math.max(20, x2-x1)+'px';
  });
}

// 매니저 연계 룰 (2026-06-16):
//   가입금액 선택 = i와 그 위(더 강한, i+1~5) 모두 자동 활성 + 디폴트 가입금액
//   "제외" 선택 = i와 그 아래(더 약한, 0~i-1) 모두 자동 제외
// amt=0 → 제외, amt>0 → i 활성 + 위 자동 활성
function setGradeAmount(i, amt){
  if(amt===0){
    // 제외 = i와 그 아래 모두 비활성, 가입금액 디폴트로 리셋
    for(let k=0;k<=i;k++){
      state.active[k]=false;
      state.amount[k]=DEFAULT_AMOUNTS[k];
    }
  } else {
    // 가입금액 박음 = i 활성 + i보다 위(더 강한) 모두 자동 활성 + 디폴트
    state.active[i]=true;
    state.amount[i]=amt;
    for(let k=i+1;k<GRADES.length;k++){
      if(!state.active[k]){
        state.active[k]=true;
        state.amount[k]=DEFAULT_AMOUNTS[k];
      }
    }
    // 새로 활성된 i = 좌측 한도부터 시작
    state.start[i]=Math.max(constraintMin(i), Math.min(constraintMax(i), state.start[i]));
  }
  // 모든 활성 등급 = 좌측 한도 재검증
  clampStarts();
  render();
}

let drag=null;
// Pointer Events = 마우스/터치/펜 통합 = iOS Safari 안정
function startDrag(e,i){
  e.preventDefault();
  const cw = chartGeom ? chartGeom.cw : 300;
  const N = chartGeom ? Math.max(1, chartGeom.N) : 1;
  drag={i, startX:e.clientX, origStart:state.start[i], rowW:cw, N, pointerId:e.pointerId};
  const overlay=document.getElementById('bar-overlay');
  if(overlay) overlay.classList.add('dragging');
  // 드래그 막대 시각 강조 = 어느 막대 잡았는지 명확
  e.currentTarget.classList.add('dragging-self');
  // pointer capture = 손가락이 바 밖으로 나가도 이벤트 유지 (= iOS 핵심)
  try{ e.target.setPointerCapture(e.pointerId); }catch(_){}
  document.addEventListener('pointermove',onDrag);
  document.addEventListener('pointerup',endDrag);
  document.addEventListener('pointercancel',endDrag);
}
function onDrag(e){
  if(!drag) return;
  e.preventDefault();
  const dx=e.clientX-drag.startX;
  const yearPx=drag.rowW/Math.max(1, drag.N-1);
  const newStart=Math.round(drag.origStart + dx/yearPx);
  if(newStart!==state.start[drag.i]) setStart(drag.i, newStart, true);
}
function endDrag(e){
  const wasDragging=!!drag;
  if(drag && e && e.target && drag.pointerId!=null){
    try{ e.target.releasePointerCapture(drag.pointerId); }catch(_){}
  }
  drag=null;
  document.removeEventListener('pointermove',onDrag);
  document.removeEventListener('pointerup',endDrag);
  document.removeEventListener('pointercancel',endDrag);
  const overlay=document.getElementById('bar-overlay');
  if(overlay) overlay.classList.remove('dragging');
  document.querySelectorAll('.bar.dragging-self').forEach(b=>b.classList.remove('dragging-self'));
  if(wasDragging) render();
}

let chartGeom=null;  // 마지막 draw 시점의 그래프 영역 좌표 (= overlay 정렬용)

function buildOverlay(){
  const overlay=document.getElementById('bar-overlay');

    const monthly = (g!=='1등급' && upperFired) ? state.amount[i]*0.20 : state.amount[i]*0.10;
    const amtStr = (monthly===Math.floor(monthly)) ? `${monthly}` : monthly.toFixed(1);

    bar.addEventListener('pointerdown',e=>startDrag(e,i));

    r.appendChild(lab);
    // 아래 점선 (회색) = 막대 시작점 → X축 (= 매년 그래프 바닥)
    const lineDown=document.createElement('div');lineDown.className='age-line-down';
    lineDown.style.left = Math.max(0,x1)+'px';
    lineDown.style.top = rowH+'px';
    const dh = chartGeom.axisOffset - (row+1)*rowH;
    lineDown.style.height = Math.max(0, dh)+'px';
    r.appendChild(lineDown);
  }
}
function yearly(){
  // 테트리스 모델 = 활성 바 = 각자 시작점/길이로 그림 위에 배치
  // - 매년 y = 활성 바 안 등급 = 합산
  // - 위 등급(인덱스 > i) 중 = 시작점 ≤ y로 발생된 게 있으면 = 본인 ×2
  // - 1등급 = 항상 ×1
  const arr=Array(termYears()).fill(0);
  for(let y=1;y<=termYears();y++){
    GRADES.forEach((g,i)=>{
      if(!state.active[i]) return;
      const s=state.start[i], len=barLen(i);
      if(y<s || y>=s+len) return;  // 바 밖
      // 라이나 룰: 매월 가입금액의 10% 지급 (등급 상향 시 = 매월 20%)
      // Y축 = 매월 받는 돈 (= 만원/월). 누적은 cs[N-1] × 12로 만원 단위 종신 환산.
      const monthly = state.amount[i] * 0.10;
      if(g==='1등급'){ arr[y-1]+=monthly; return; }
      const upperFired = GRADES.slice(i+1).some((ug,j)=>state.active[i+1+j] && state.start[i+1+j]<=y);
      arr[y-1] += upperFired ? monthly*2 : monthly;
    });
  }
  return arr;
}

let chartData={y:[],c:[]};
function compute(){
  const ys=yearly();let cum=0;const cs=ys.map(v=>cum+=v);
  // 표시는 SHOW년 시점 기준 (= 등급 진행은 termYears()=40, 화면은 termYears()=30)
  const ysShow=ys.slice(0,termYears());const csShow=cs.slice(0,termYears());
  // ys/cs = 매월 단위(만원). peak = 매월 최대 수령액. total = 종신 누적 = cs[N-1] × 12
  const peak=Math.max(...ysShow,0);
  const totalMonthly = csShow[termYears()-1]||0;
  const total = Math.round(totalMonthly * 12);  // 매월 합 × 12 = 평생 받는 총액 만원

  document.getElementById('totV').innerHTML=total.toLocaleString()+'<small>만원</small>';
  const payYears = Math.min(state.payTerm, termYears());  // = 납입기간이 끝나기 전에 사망하면 = 그 전까지만
  const paidTotal=prem*12*payYears;
  const ratio = paidTotal>0 ? (total*10000/paidTotal) : 0;
  const net = total - Math.round(paidTotal/10000);  // 순수익 (= 만원 단위)
  const paidMan = Math.round(paidTotal/10000);
  document.getElementById('punch').innerHTML=
    `<span class="note">${state.endAge}세 기준</span>`+
    `<div class="row">월 <b>${prem.toLocaleString()}원</b> 내고</div>`+
    `<div class="row">평생 누적 <b>${total.toLocaleString()}만원</b> 수령</div>`+
    `<div class="row paid div-line">낸 보험료 = 월 ${prem.toLocaleString()}원 × ${payYears}년 = <b>${paidMan.toLocaleString()}만원</b></div>`+
    `<div class="row">순수익 = <b>${net.toLocaleString()}만원</b></div>`;
  document.getElementById('meta').innerHTML=
    `<span>가입 <b>${state.age}세 ${state.gender}</b> · 납입 <b>${state.payTerm}년</b></span><span><b>${state.sigang==='장기요양'?'장기요양':'뇌혈관질환'}</b> · ${state.plan==='뉴노멀I'?'뉴노멀 I':'뉴노멀 II'}</span><span>관찰 <b>${state.age}세→${state.endAge}세 (${termYears()}년)</b></span>`;
  chartData={y:ysShow,c:csShow};draw();
}
function firstActiveStart(){
  for(let i=0;i<GRADES.length;i++) if(state.active[i]) return state.start[i];
  return 1;
}
function draw(targetCanvas, screenWOverride){
  const cv=targetCanvas||document.getElementById('chart'),dpr=window.devicePixelRatio||1;
  // 차트 안쪽 = 큰 너비 (= 가로 스크롤). 년차당 px = 화면 크기에 따라 자동
  const TR=termYears(), fs=firstActiveStart();
  const N=Math.max(1, TR-fs+1);
  // 40년 = 화면 너비 고정. N <= 40 = 한 화면 (= 스크롤 X) / N > 40 = 가로 스크롤
  // 캡처 모드 = screenWOverride 강제 (= 940 wrapper 너비)
  const screenW = screenWOverride ? screenWOverride : ((window.innerWidth||360) - 20);
  const yearPx = screenW / 40;
  const innerW = N <= 40 ? screenW : Math.round(N * yearPx);
  // chart-inner 너비 강제 (= 캡처 wrapper에는 무관 = 그 때 직접 설정)
  if(!targetCanvas){
    const inner=document.getElementById('chart-inner');
    if(inner){ inner.style.width = innerW+'px'; }
    cv.style.width = innerW+'px';
  }
  // H = 화면 높이의 70% (= 두꺼운 막대 + 그래프 영역 둘 다 확보, min 440 / max 720)
  const H = Math.max(440, Math.min(Math.round((window.innerHeight||720)*0.7), 720));
  if(!targetCanvas){
    // chartbox = canvas + padding-top(20) 같이 = 잘림 방지
    const cb=document.getElementById('chartbox'); if(cb) cb.style.height=(H+20)+'px';
    const ci=document.getElementById('chart-inner'); if(ci) ci.style.height=H+'px';
    cv.style.height=H+'px';
  }
  const W=cv.clientWidth;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  // 영역 분리 = 위 = 등급 막대 (캔버스 거의 최상단) / 아래 = 매년 그래프
  // rowH=50 = 막대 두툼 + 드래그 쉬움 / 그래프 영역(ch) = 또 30% 줄어듬 (기존 35 대비)
  const rowH = 50;
  const overlayH = rowH*6 + 4;
  const pL=44, pR=44;
  const barTop = 6;                        // 등급 막대 = 거의 위쪽
  const pT = barTop + overlayH + 10;
  const pB = 28;
  const cw=W-pL-pR, ch=H-pT-pB;
  const ysAll=chartData.y, csAll=chartData.c;
  // 능동 자르기 = 첫 활성 시작 시점 ~ 100세까지만 표시 (TR, fs 위에서 정의됨)
  const ys=ysAll.slice(fs-1), cs=csAll.slice(fs-1);
  // Y축 좌측(매년) = 깔끔 단위 [10/20/50/100/200/500/1000]
  // Y축 우측(누적) = 50 배수
  const niceList=[10,20,50,100,200,500,1000,2000,5000];
  const niceStepNice=(v)=>{
    const raw=v*1.18/4;
    for(const n of niceList) if(raw<=n) return n;
    return Math.ceil(raw/1000)*1000;
  };
  const niceStep=(v,unit)=>Math.max(unit, Math.ceil(v*1.18/4/unit)*unit);
  const stepC=niceStep(Math.max(...cs,1),50);
  // Y축 매년 = 동적 = 매니저 가입금액 합 + ×2 효과 자동 반영 (= 데이터 기반, 100 단위 6분할)
  const ysMax = Math.max(...ys, 1);
  const stepY = Math.max(100, Math.ceil(ysMax*1.18/6/100)*100);  // 6분할 단위
  const maxY = stepY*6;
  const maxC=stepC*4;
  // y축 좌측 = 매년 받는 금액 = 6분할 (= 100 단위)
  ctx.strokeStyle='#e4e8f0';ctx.lineWidth=1;
  for(let i=0;i<=6;i++){const y=pT+ch*i/6;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();}
  ctx.fillStyle='#2f54d6';ctx.font='bold 11px sans-serif';ctx.textAlign='right';
  for(let i=0;i<=6;i++){const y=pT+ch*i/6;ctx.fillText(Math.round(maxY*(6-i)/6).toLocaleString(),pL-4,y+4);}
  // x축 = 가입 연령 5세 간격
  const startAge=state.age+fs-1, endAge=state.endAge;
  const labelAges=[];
  if(startAge%5!==0) labelAges.push(startAge);
  for(let a=Math.ceil(startAge/5)*5; a<=endAge; a+=5) labelAges.push(a);
  ctx.fillStyle='#16203a';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
  labelAges.forEach(a=>{
    const yr=a-state.age+1;
    const idx=yr-fs;
    const x=pL+cw*idx/Math.max(1,N-1);
    ctx.fillText(a+'세',x,H-10);
  });
  const xAt=i=>pL+cw*i/Math.max(1,N-1);
  // 막대 = 그 시점 활성 등급 수에 따라 = 색상 자체 변화 (= 한눈에 차별)
  // 1개 = 옅은 파랑 / 6개 = 진한 빨강 = 무지개 그라데이션
  const COLORS=['#cfe2ff','#7dd3fc','#3b82f6','#1e40af','#9333ea','#dc2626'];
  const bw=cw/N*0.65;
  ys.forEach((v,i)=>{
    if(v<=0) return;
    const y=i+fs;
    let cnt=0;
    GRADES.forEach((g,gi)=>{
      if(!state.active[gi]) return;
      if(y<state.start[gi] || y>=state.start[gi]+barLen(gi)) return;
      cnt++;
    });
    ctx.fillStyle = COLORS[Math.min(5, Math.max(0, cnt-1))] || '#e5e7eb';
    const h=ch*v/maxY;
    ctx.fillRect(xAt(i)-bw/2,pT+ch-h,bw,h);
  });
  // 누적 라인 = 노랑 + 굵게
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=4;ctx.beginPath();
  cs.forEach((v,i)=>{const x=xAt(i),y=pT+ch-ch*v/maxC;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();
  // 끝점 dot = 노랑
  const lx=xAt(N-1),ly=pT+ch-ch*cs[N-1]/maxC;ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(lx,ly,6,0,7);ctx.fill();
  // 우측 누적 숫자 = 노랑
  ctx.textAlign='left';ctx.fillStyle='#d97706';ctx.font='bold 11px sans-serif';
  for(let i=0;i<=4;i++){const y=pT+ch*i/4;ctx.fillText(Math.round(maxC*(4-i)/4).toLocaleString(),W-pR+4,y+4);}
  // 끝점 옆 = 총 누적 금액 박스 (= 노랑 박스 + 흰 글자)
  const finalCum=cs[N-1];
  if(finalCum>0){
    ctx.font='bold 13px sans-serif';ctx.textAlign='right';
    const txt=finalCum.toLocaleString()+'만';
    const tw=ctx.measureText(txt).width+14;
    const bx=lx-tw-8, by=Math.max(pT, ly-22);
    ctx.fillStyle='#f59e0b';
    ctx.fillRect(bx,by,tw,20);
    ctx.fillStyle='#fff';
    ctx.fillText(txt,bx+tw-7,by+14);
  }
  // overlay 정렬용 좌표 저장
  if(!targetCanvas) chartGeom = {pL, pT:barTop, ch, cw, N, fs, rowH, axisOffset: pT+ch-barTop};
}
function render(){clampAmounts();buildChecks();compute();buildOverlay();}
document.getElementById('saveBtn').onclick=()=>{
  // 캡처용 wrapper = 940px 고정 (= 모바일에서도 가로 와이드 저장)
  const WRAP_W = 940, WRAP_PAD = 18, INNER_W = WRAP_W - WRAP_PAD*2;  // = 904
  const w=document.createElement('div');
  w.style.cssText=`background:#eceff5;padding:${WRAP_PAD}px;width:${WRAP_W}px;position:fixed;left:-9999px;top:0`;
  const headerClone=document.getElementById('header').cloneNode(true);
  const chartClone=document.getElementById('chartcard').cloneNode(true);
  const resultClone=document.getElementById('resultcard').cloneNode(true);
  w.appendChild(headerClone);
  w.appendChild(chartClone);
  w.appendChild(resultClone);
  document.body.appendChild(w);
  // 원본 chartGeom = 폰 너비 기준. 캡처 = 940 wrapper 기준 = 비율 변경 필요
  const oldCw = chartGeom ? chartGeom.cw : INNER_W;
  // 940 wrapper 안 = chart-inner 너비 = INNER_W로 강제 + canvas redraw (= 새 chartGeom)
  const clonedInner = chartClone.querySelector('.chart-inner');
  if(clonedInner){
    clonedInner.style.width = INNER_W+'px';
  }
  const newCanvas=chartClone.querySelector('canvas');
  if(newCanvas){
    newCanvas.removeAttribute('id');
    newCanvas.style.width = INNER_W+'px';
    // 두 번째 인자 = 캡처 screen 너비 강제 (= INNER_W + 20 padding)
    draw(newCanvas, INNER_W+20);
  }
  // 새 chartGeom = INNER_W 기준 (= draw 호출로 갱신됨)
  const newCw = chartGeom ? chartGeom.cw : INNER_W;
  const ratio = newCw / oldCw;
  // clone overlay 안 = 막대/점선/라벨 좌표 = 비율 곱해서 = 940 그래프에 맞춤
  const clonedOverlay = chartClone.querySelector('.bar-overlay');
  if(clonedOverlay){
    const oldOvW = parseFloat(clonedOverlay.style.width) || oldCw;
    clonedOverlay.style.width = (oldOvW * ratio)+'px';
    clonedOverlay.querySelectorAll('.bar, .age-line, .age-line-down, .age-label').forEach(el=>{
      const left = parseFloat(el.style.left) || 0;
      el.style.left = (left * ratio)+'px';
      if(el.classList.contains('bar')){
        const bw = parseFloat(el.style.width) || 0;
        el.style.width = (bw * ratio)+'px';
      }
    });
  }
  // 약간 지연 후 캡처 (= 레이아웃 적용 대기)
  setTimeout(()=>{
    html2canvas(w,{scale:2,backgroundColor:'#eceff5'}).then(c=>{
      const a=document.createElement('a');
      a.download=`브레인케어_${state.age}세_${state.gender}_${state.sigang}_${state.plan}_${state.payTerm}년납_${state.endAge}세.png`;
      a.href=c.toDataURL('image/png');
      a.click();
      document.body.removeChild(w);
      // 원본 화면 = chartGeom 복구 (= 캡처 시 갱신된 거 = 원래 폰 너비 기준 다시)
      render();
    });
  },50);
};
render();
window.addEventListener('resize',()=>render());
</script>
