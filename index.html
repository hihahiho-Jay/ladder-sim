<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>브레인케어 생활자금 시뮬레이터</title>
<style>
  :root{--bg:#eef2f9;--card:#ffffff;--line:#e1e6f0;--txt:#161d2c;--sub:#4f5870;
    --accent:#2f6df0;--gold:#a35e09;--peak:#d9560a;--dead:#bcc3d2;--profit:#13923f;--inp:#f2f5fb}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Apple SD Gothic Neo",sans-serif;max-width:480px;margin:0 auto;padding:16px 16px 46px}
  h1{font-size:25px;margin:4px 0 3px;font-weight:800;letter-spacing:-.3px}
  .sub{color:var(--sub);font-size:15px;margin-bottom:16px;font-weight:500}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:17px;margin-bottom:14px;box-shadow:0 2px 8px rgba(30,45,90,.06)}
  .card h2{font-size:17px;margin:0 0 14px;color:var(--txt);font-weight:800}

  /* 가입 설정 */
  .row3{display:flex;gap:8px;margin-bottom:12px}
  .row3>div{flex:1}
  label.l{display:block;font-size:12.5px;color:var(--sub);margin-bottom:6px;font-weight:600}
  select{width:100%;background:var(--inp);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:16px;font-weight:600}
  .seg{display:flex;gap:4px}
  .seg button{flex:1;background:var(--inp);color:var(--sub);border:1px solid var(--line);border-radius:10px;padding:11px 4px;font-size:15px;font-weight:700}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .seg button:disabled{opacity:.4;cursor:not-allowed}
  .amtrow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
  .amtrow:last-child{border-bottom:none}
  .amtrow .nm{width:70px;font-size:15.5px;font-weight:700;display:flex;align-items:center;gap:6px}
  .amtrow .nm i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .amtrow select{flex:1}
  .premline{margin-top:15px;text-align:center;font-size:15.5px;color:var(--sub);font-weight:600}
  .premline b{color:var(--accent);font-size:25px}

  /* 받는 시나리오 슬라이더 */
  .grow{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .grow:last-child{border-bottom:none}
  .gtog{width:62px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--inp);
    color:var(--sub);font-size:15px;font-weight:800;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:6px}
  .gtog .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;background:var(--dead)}
  .gtog.on{color:#fff}
  .gsl{flex:1;display:flex;align-items:center;gap:9px}
  .gsl input{flex:1;height:38px;-webkit-appearance:none;background:transparent}
  .gsl input::-webkit-slider-runnable-track{height:8px;border-radius:8px;background:#d7dded}
  .gsl input::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:50%;background:#fff;border:3px solid var(--accent);margin-top:-12px;box-shadow:0 1px 5px rgba(0,0,0,.22)}
  .gsl input:disabled{opacity:.4}
  .gage{width:56px;text-align:right;font-size:19px;font-weight:800}
  .gage.off{color:var(--dead);font-weight:600;font-size:14px}

  /* 막대그래프 */
  .graph{display:flex;align-items:flex-end;gap:2px;height:168px;margin:16px 0 2px;border-bottom:2px solid var(--line)}
  .gcol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
  .gval{font-size:13px;font-weight:800;color:var(--txt);margin-bottom:4px;line-height:1;height:15px;white-space:nowrap}
  .gb{width:100%;display:flex;flex-direction:column-reverse;border-radius:3px 3px 0 0;overflow:hidden;min-height:2px;background:#eef1f7;transition:height .12s}
  .seg2{width:100%;flex:1;min-height:1px}
  .xaxis{display:flex;gap:2px;margin-top:6px}
  .xcol{flex:1;text-align:center;font-size:12px;color:var(--sub);font-weight:600;white-space:nowrap}
  .peaklab{font-size:13.5px;color:var(--peak);text-align:center;font-weight:800;margin-top:6px;height:18px}
  .legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px;font-size:12.5px;color:var(--sub);font-weight:600}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}

  /* 정산 */
  .settle .row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--line);font-size:16.5px}
  .settle .row .k{color:var(--sub);font-weight:600}
  .settle .row .v{font-weight:800}
  .settle .big{padding-top:15px;text-align:center;border:none}
  .settle .big .k{font-size:15.5px;color:var(--sub);font-weight:700}
  .settle .big .v{font-size:44px;font-weight:900;color:var(--profit);line-height:1.12;margin-top:2px}
  .settle .big .v small{font-size:19px}
  .settle .ratio{text-align:center;font-size:16px;color:var(--gold);font-weight:800;margin-top:4px}
  .warn{font-size:12px;color:var(--sub);margin-top:15px;line-height:1.6}
</style>
</head>
<body>
  <h1>브레인케어 생활자금 시뮬레이터</h1>
  <div class="sub">건강이 나빠져도 — 매달 받는 돈은 늘어납니다</div>

  <div class="card" id="gear">
    <h2>가입 설정 (상품 · 금액 · 보험료)</h2>
    <div class="row3">
      <div><label class="l">가입 나이</label><select id="age"></select></div>
      <div><label class="l">사망(끝) 나이</label><select id="endAge"></select></div>
      <div><label class="l">성별</label><div class="seg" id="gender"><button data-v="남" class="on">남</button><button data-v="여">여</button></div></div>
    </div>
    <div class="row3">
      <div><label class="l">상품</label><div class="seg" id="plan"><button data-v="뉴노멀I" class="on">뉴노멀 I</button><button data-v="뉴노멀II">뉴노멀 II</button></div></div>
      <div><label class="l">유형</label><div class="seg" id="classic"><button data-v="일반" class="on">일반</button><button data-v="클래식">클래식</button></div></div>
    </div>
    <div class="row3">
      <div><label class="l">종류</label><div class="seg" id="sigang"><button data-v="장기요양" class="on">장기요양</button><button data-v="뇌혈관">뇌혈관</button></div></div>
      <div><label class="l">납입</label><div class="seg" id="payTerm"><button data-v="20" class="on">20년</button><button data-v="30">30년</button></div></div>
      <div><label class="l">만기</label><div class="seg" id="maturity"><button data-v="종신" class="on">종신</button><button data-v="90세">90세</button></div></div>
    </div>
    <div style="margin-top:6px"><label class="l">등급별 가입금액 (월 보장, 만원)</label><div id="amtbox"></div></div>
    <div class="premline">매달 내는 보험료 <b id="premV">0</b>원</div>
  </div>

  <div class="card">
    <h2>받는 시나리오 — 등급 켜고 슬라이더로 "몇 세에" 조절</h2>
    <div id="setbox"></div>
  </div>

  <div class="card">
    <h2>나이별 매달 받는 돈 (막대 색 = 그 해 받는 등급)</h2>
    <div class="graph" id="graph"></div>
    <div class="xaxis" id="xaxis"></div>
    <div class="peaklab" id="peaklab"></div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="card settle">
    <h2>정산</h2>
    <div class="row"><span class="k">매달 내는 보험료</span><span class="v" id="s_prem">0원</span></div>
    <div class="row"><span class="k">총 보험료</span><span class="v" id="s_paid">0만원</span></div>
    <div class="row"><span class="k">총 지급액</span><span class="v" id="s_recv">0만원</span></div>
    <div class="big"><div class="k">총 지급액 − 총 보험료</div><div class="v"><span id="s_profit">0</span><small>만원</small></div></div>
    <div class="ratio" id="s_ratio"></div>
    <div class="warn">⚠️ 교육·상담 참고용. 보험료 중간 나이는 공식 요율표 곡선 보간(표상 나이는 정확 일치). 실제 금액·보장은 약관 확인. 90일 면책기간 적용.</div>
  </div>

<script src="sim_data.js"></script>
<script>
const PREM_FULL=window.PREM_FULL, LIMITS=window.LIMITS;
const GRADES=['인지지원등급','5등급','4등급','3등급','2등급','1등급'];
const SHORT =['인지','5급','4급','3급','2급','1급'];
const COLORS=['#ff5b5b','#ff9f43','#f5c400','#34c759','#2f6df0','#9a5cf0']; // 인지~1급 = 빨주노초파보
const DURATION={'인지지원등급':10,'5등급':10,'4등급':10,'3등급':999,'2등급':999,'1등급':999};
const DEFAULT_AMOUNTS=[50,100,150,250,500,500];

const state={age:65,gender:'남',sigang:'장기요양',plan:'뉴노멀I',classic:'일반',maturity:'종신',payTerm:20,endAge:90,
  amount:[...DEFAULT_AMOUNTS], onset:[65,null,70,null,75,null]};

/* ===== 보험료 (검증 로직 그대로) ===== */
function resolvePayTerm(age,pt){ if(age>=71)return'종신'; if(age>=70)return pt==='30'?'20':pt; return pt==='10'?'20':pt; }
function limitOf(g){ const band=state.age>=65?'65이상':'64이하'; return LIMITS[state.plan][g][band]; }
function amountOptions(g){ const lim=limitOf(g); const o=[]; for(let m=50;m<=lim;m+=50)o.push(m); return o; }
function clampAmounts(){ GRADES.forEach((g,i)=>{ const lim=limitOf(g); if(state.amount[i]>lim)state.amount[i]=lim; }); }
function premium(){
  const pt=resolvePayTerm(state.age,String(state.payTerm));
  const data=PREM_FULL[`${state.plan}|${state.classic}|${state.gender}|${state.maturity}|${pt}`];
  if(!data)return 0;
  const age=String(state.age); let sum=0;
  if(data['주계약']&&data['주계약'][age])sum+=data['주계약'][age][1];
  GRADES.forEach((g,i)=>{
    const gs=g.replace('등급',''); const tbl=data[`${state.sigang}|${gs}`];
    const row=tbl&&tbl[age];
    if(row){const[ent,prm]=row; sum+=Math.round(prm*state.amount[i]/ent);}
  });
  return Math.round(sum);
}
function payYears(){ const pt=resolvePayTerm(state.age,String(state.payTerm)); return pt==='종신'?(state.endAge-state.age+1):(+pt); }

/* ===== 받는 돈 (onset) ===== */
function durOf(i){ return DURATION[GRADES[i]]!==999 ? 10 : (state.endAge-state.onset[i]+1); }
function alive(i,age){ return state.onset[i]!=null && age>=state.onset[i] && age<state.onset[i]+durOf(i); }
function monthlyOf(i,age){
  if(!alive(i,age))return 0;
  const base=state.amount[i]*0.10;
  if(GRADES[i]==='1등급')return base;
  const upper=GRADES.slice(i+1).some((g,j)=> state.onset[i+1+j]!=null && state.onset[i+1+j]<=age);
  return upper?base*2:base;
}
function totalAt(age){let s=0;GRADES.forEach((g,i)=>s+=monthlyOf(i,age));return s;}
function clampOnset(i,v){
  let lo=state.age,hi=state.endAge;
  for(let k=i-1;k>=0;k--){if(state.onset[k]!=null){lo=state.onset[k]+1;break;}}
  for(let k=i+1;k<GRADES.length;k++){if(state.onset[k]!=null){hi=state.onset[k]-1;break;}}
  return Math.max(lo,Math.min(hi,v));
}

/* ===== 옵션 제약 ===== */
function applyAgeConstraints(){
  const age=state.age;
  const matBox=document.getElementById('maturity'), m90=matBox.querySelector('[data-v="90세"]');
  if(age>=70){ state.maturity='종신'; m90.disabled=true; } else m90.disabled=false;
  const ptBox=document.getElementById('payTerm'), p30=ptBox.querySelector('[data-v="30"]');
  const block30=(state.maturity==='종신'&&age>=66);
  if(block30){ if(state.payTerm===30)state.payTerm=20; p30.disabled=true; } else p30.disabled=false;
}

/* ===== 가입 설정 ===== */
const ageSel=document.getElementById('age'); for(let a=30;a<=75;a++){const o=document.createElement('option');o.value=a;o.textContent=a+'세';ageSel.appendChild(o);} ageSel.value=state.age;
const endSel=document.getElementById('endAge');
function buildEndAge(){ endSel.innerHTML=''; for(let a=Math.max(state.age+1,70);a<=110;a++){const o=document.createElement('option');o.value=a;o.textContent=a+'세';endSel.appendChild(o);} if(state.endAge<=state.age)state.endAge=90; endSel.value=state.endAge; }
ageSel.onchange=e=>{ state.age=+e.target.value; if(state.endAge<=state.age)state.endAge=Math.max(state.age+1,90); buildEndAge(); applyAgeConstraints(); clampAmounts();
  state.onset=state.onset.map(v=> v==null?null:Math.max(state.age,Math.min(state.endAge,v))); fixOnsetOrder(); render(); };
endSel.onchange=e=>{ state.endAge=+e.target.value; state.onset=state.onset.map(v=>v==null?null:Math.min(state.endAge,v)); fixOnsetOrder(); render(); };
function seg(id,key){const b=document.getElementById(id);b.querySelectorAll('button').forEach(x=>x.onclick=()=>{ if(x.disabled)return; state[key]=isNaN(+x.dataset.v)?x.dataset.v:+x.dataset.v;applyAgeConstraints();clampAmounts();render();});}
seg('gender','gender');seg('sigang','sigang');seg('plan','plan');seg('classic','classic');seg('maturity','maturity');seg('payTerm','payTerm');
function fixOnsetOrder(){ for(let i=0;i<GRADES.length;i++){ if(state.onset[i]!=null) state.onset[i]=clampOnset(i,state.onset[i]); } }

function buildAmt(){
  const box=document.getElementById('amtbox'); box.innerHTML='';
  GRADES.forEach((g,i)=>{
    const row=document.createElement('div'); row.className='amtrow';
    const nm=document.createElement('div'); nm.className='nm'; nm.innerHTML=`<i style="background:${COLORS[i]}"></i>${SHORT[i]}`;
    const sel=document.createElement('select');
    amountOptions(g).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m+'만';sel.appendChild(o);});
    sel.value=state.amount[i];
    sel.onchange=e=>{ state.amount[i]=+e.target.value; render(); };
    row.appendChild(nm); row.appendChild(sel); box.appendChild(row);
  });
}

/* ===== 받는 시나리오 슬라이더 ===== */
function buildSet(){
  const box=document.getElementById('setbox'); box.innerHTML='';
  GRADES.forEach((g,i)=>{
    const row=document.createElement('div'); row.className='grow';
    const tog=document.createElement('button'); tog.className='gtog'+(state.onset[i]!=null?' on':'');
    if(state.onset[i]!=null) tog.style.background=COLORS[i];
    tog.textContent=SHORT[i];
    tog.onclick=()=>{
      if(state.onset[i]==null){ let def=state.age+2; for(let k=i-1;k>=0;k--){if(state.onset[k]!=null){def=state.onset[k]+1;break;}} state.onset[i]=clampOnset(i,def); }
      else state.onset[i]=null;
      render();
    };
    const sl=document.createElement('div'); sl.className='gsl';
    const inp=document.createElement('input'); inp.type='range'; inp.min=state.age; inp.max=state.endAge; inp.step=1;
    inp.value=state.onset[i]!=null?state.onset[i]:state.age; inp.disabled=state.onset[i]==null;
    const age=document.createElement('div'); age.className='gage'+(state.onset[i]==null?' off':'');
    age.textContent=state.onset[i]!=null?state.onset[i]+'세':'안받음';
    inp.oninput=(e)=>{ const v=clampOnset(i,+e.target.value); state.onset[i]=v; e.target.value=v; age.textContent=v+'세'; updateGraph(); updateSettle(); };
    sl.appendChild(inp); sl.appendChild(age);
    row.appendChild(tog); row.appendChild(sl); box.appendChild(row);
  });
}

/* ===== 막대그래프 ===== */
function ages(){ const a=[]; for(let x=state.age;x<=state.endAge;x++)a.push(x); return a; }
function updateGraph(){
  const A=ages(); const vals=A.map(a=>totalAt(a));
  const peak=Math.max(...vals,0); const peakAge=A[vals.indexOf(peak)];
  const g=document.getElementById('graph'); g.innerHTML='';
  A.forEach((a,idx)=>{
    const v=vals[idx];
    const col=document.createElement('div'); col.className='gcol';
    const prev=idx>0?vals[idx-1]:0;
    const lab=document.createElement('div'); lab.className='gval'; lab.textContent=(v>0&&v!==prev)?(Math.round(v*10)/10):'';
    const bar=document.createElement('div'); bar.className='gb'; bar.style.height=(peak>0?Math.max(2,(v/peak)*100):2)+'%';
    if(v>0) GRADES.forEach((gg,i)=>{ if(!alive(i,a))return; const s=document.createElement('div');s.className='seg2';s.style.background=COLORS[i];bar.appendChild(s); });
    col.appendChild(lab); col.appendChild(bar); g.appendChild(col);
  });
  const xax=document.getElementById('xaxis'); xax.innerHTML='';
  A.forEach(a=>{ const s=document.createElement('div'); s.className='xcol'; s.textContent=(a%5===0)?a:''; xax.appendChild(s); });
  document.getElementById('peaklab').textContent= peak>0?`최대 ${Math.round(peak*10)/10}만원/월 — ${peakAge}세 무렵`:'';
}

/* ===== 정산 ===== */
function updateSettle(){
  const prem=premium();
  const paidMan=Math.round(prem*payYears()*12/10000);
  const recvMan=Math.round(ages().reduce((s,a)=>s+totalAt(a)*12,0));
  const profit=recvMan-paidMan;
  const ratio=paidMan>0?(recvMan/paidMan):0;
  document.getElementById('premV').textContent=prem.toLocaleString();
  document.getElementById('s_prem').textContent=prem.toLocaleString()+'원';
  document.getElementById('s_paid').textContent=paidMan.toLocaleString()+'만원';
  document.getElementById('s_recv').textContent=recvMan.toLocaleString()+'만원';
  document.getElementById('s_profit').textContent=profit.toLocaleString();
  document.getElementById('s_ratio').textContent=ratio>0?`총 보험료의 ${ratio.toFixed(1)}배`:'';
}

function buildLegend(){ const L=document.getElementById('legend'); L.innerHTML=''; GRADES.forEach((g,i)=>{const s=document.createElement('span');s.innerHTML=`<i style="background:${COLORS[i]}"></i>${SHORT[i]}`;L.appendChild(s);}); }

function render(){
  ['gender','sigang','plan','classic'].forEach(id=>document.getElementById(id).querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.v==state[id])));
  document.getElementById('maturity').querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.v===state.maturity));
  document.getElementById('payTerm').querySelectorAll('button').forEach(b=>b.classList.toggle('on',+b.dataset.v===state.payTerm));
  buildAmt(); buildSet(); updateGraph(); updateSettle();
}
buildEndAge(); applyAgeConstraints(); buildLegend(); render();
</script>
</body>
</html>
